---
name: 'tests'
on:
  workflow_call:
    inputs:
      releases:
        type: string
        required: true
      default_index:
        type: string
        default: '0'

jobs:
  test-per-release:
    strategy:
      matrix:
        include:
          - ${{ fromJSON(inputs.releases)[fromJSON(inputs.default_index)] }}
    uses: ./.github/workflows/test-per-release.yml
    with:
      release: ${{ matrix.release }}
      default_release: ${{ fromJSON(inputs.releases)[fromJSON(inputs.default_index)].release }}

  test-full-action:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - ${{ fromJSON(inputs.releases)[fromJSON(inputs.default_index)] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: ./.github/actions/fix-testing-image-tag
        with:
          release: ${{ matrix.release }}
          default_release: ${{ fromJSON(inputs.releases)[fromJSON(inputs.default_index)].release }}
      - uses: ./.github/actions/clone-test-project
        id: clone
        with:
          release: ${{ matrix.release }}

      - name: Test top action
        id: top-action
        uses: ./
        with:
          source_path: ${{ steps.clone.outputs.source_path }}
          output_path: ${{ hashFiles('action.yml', 'actions/*/action.yml') }}

